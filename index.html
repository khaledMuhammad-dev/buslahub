<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    color: white;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Background Blur */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: #3b82f6;
    border-radius: 50%;
    filter: blur(180px);
    opacity: 0.25;
    top: -200px;
    left: -200px;
}

body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: #8b5cf6;
    border-radius: 50%;
    filter: blur(180px);
    opacity: 0.25;
    bottom: -150px;
    right: -150px;
}

.floating {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    animation: float 12s infinite ease-in-out;
}

.f1 {
    width: 120px;
    height: 120px;
    top: 15%;
    left: 15%;
}

.f2 {
    width: 80px;
    height: 80px;
    top: 70%;
    left: 10%;
    animation-delay: 3s;
}

.f3 {
    width: 150px;
    height: 150px;
    right: 12%;
    top: 20%;
    animation-delay: 5s;
}

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-25px); }
}

.container {
    max-width: 900px;
    width: 90%;
    text-align: center;
    position: relative;
    z-index: 10;
}

.badge {
    display: inline-block;
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
}

h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    line-height: 1;
    margin-bottom: 20px;
}

.gradient-text {
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.description {
    font-size: 1.1rem;
    color: #cbd5e1;
    max-width: 650px;
    margin: 0 auto 50px;
    line-height: 1.8;
}

.countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 50px;
}

.time-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 20px;
}

.time-value {
    font-size: 2.5rem;
    font-weight: 800;
}

.time-label {
    color: #94a3b8;
    margin-top: 6px;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 1px;
}

.form {
    display: flex;
    gap: 12px;
    justify-content: center;
    max-width: 550px;
    margin: auto;
}

input {
    flex: 1;
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

input::placeholder {
    color: #94a3b8;
}

button {
    border: none;
    cursor: pointer;
    padding: 16px 28px;
    border-radius: 14px;
    font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
}

.footer {
    margin-top: 40px;
    color: #94a3b8;
    font-size: 0.9rem;
}

@media (max-width: 768px) {

    .countdown {
        grid-template-columns: repeat(2, 1fr);
    }

    .form {
        flex-direction: column;
    }

    button {
        width: 100%;
    }
}
</style>
</head>
<body>

<div class="floating f1"></div>
<div class="floating f2"></div>
<div class="floating f3"></div>

<div class="container">

    <div class="badge">
        🚀 Launching Soon
    </div>

    <h1>
        Something <span class="gradient-text">Amazing</span><br>
        Is Coming
    </h1>

    <p class="description">
        We're building something special. Stay tuned and be the first to know when we launch.
    </p>

    <div class="countdown">
        <div class="time-box">
            <div id="days" class="time-value">00</div>
            <div class="time-label">Days</div>
        </div>

        <div class="time-box">
            <div id="hours" class="time-value">00</div>
            <div class="time-label">Hours</div>
        </div>

        <div class="time-box">
            <div id="minutes" class="time-value">00</div>
            <div class="time-label">Minutes</div>
        </div>

        <div class="time-box">
            <div id="seconds" class="time-value">00</div>
            <div class="time-label">Seconds</div>
        </div>
    </div>

    <form class="form">
        <input
            type="email"
            placeholder="Enter your email"
            required
        />
        <button type="submit">
            Notify Me
        </button>
    </form>

    <div class="footer">
        © 2026 Your Company. All rights reserved.
    </div>

</div>

<script>
// Set launch date
const launchDate = new Date("December 31, 2026 00:00:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = launchDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
    );

    const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
    );

    const seconds = Math.floor(
        (distance % (1000 * 60)) / 1000
    );

    document.getElementById("days").innerText =
        String(days).padStart(2, "0");

    document.getElementById("hours").innerText =
        String(hours).padStart(2, "0");

    document.getElementById("minutes").innerText =
        String(minutes).padStart(2, "0");

    document.getElementById("seconds").innerText =
        String(seconds).padStart(2, "0");
}

setInterval(updateCountdown, 1000);
updateCountdown();

document.querySelector(".form").addEventListener("submit", (e) => {
    e.preventDefault();
    alert("Thank you! We'll notify you when we launch.");
});
</script>

</body>
</html>
